name: Create release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install package dependencies
        run: bun install --frozen-lockfile

      - name: Bump package.json version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json

      - name: Run build script
        run: bun run build

      - name: Push version bump change
        uses: EndBug/add-and-commit@v9
        with:
          add: package.json fxmanifest.lua
          push: true
          default_author: github_actions
          message: 'chore: bump version to ${{ github.ref_name }}'

      - name: Install zip
        run: sudo apt install zip

      - name: Prepare release bundle
        run: |
          mkdir -p ./temp/kura-ui/{client,server,web/build}
          cp ./{README.md,LICENSE,package.json,fxmanifest.lua,init.lua} ./temp/kura-ui/ || true
          cp -r ./client/* ./temp/kura-ui/client/ || true
          cp -r ./server/* ./temp/kura-ui/server/ || true
          cp -r ./web/build/* ./temp/kura-ui/web/build/ || true

      - name: Smoke test packaged UI bundle
        run: |
          test -f ./temp/kura-ui/fxmanifest.lua
          test -f ./temp/kura-ui/init.lua
          test -f ./temp/kura-ui/web/build/index.html

      - name: Bundle files
        run: |
          cd ./temp && zip -r ../kura-ui.zip ./kura-ui

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: kura-ui.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
